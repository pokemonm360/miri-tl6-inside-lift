CONFIG_ADC=y
CONFIG_ADC_ADS1220=y
CONFIG_SPI=y
CONFIG_GPIO=y
CONFIG_PRINTK=y

CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=2      

