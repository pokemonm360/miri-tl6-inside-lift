# Core I/O used by src/main.c
CONFIG_GPIO=y
CONFIG_ADC=y
CONFIG_SPI=y
CONFIG_I2C=y
CONFIG_PWM=y
CONFIG_SENSOR=y

# Concrete drivers used by the board overlay
CONFIG_ADC_STM32=y
CONFIG_ADC_ADS1220=y
CONFIG_PWM_STM32=y
CONFIG_INA236=y

# UART is used directly for telemetry, and Modbus owns the RS-485 UART.
CONFIG_SERIAL=y
CONFIG_UART_STM32=y
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_UART_CONSOLE=n
CONFIG_STDOUT_CONSOLE=n
CONFIG_PRINTK=y

# Modbus RTU server on USART1/RS-485.
CONFIG_MODBUS=y
CONFIG_MODBUS_ROLE_SERVER=y

# Float formatting is used by snprintf() telemetry.
CONFIG_NEWLIB_LIBC=y
CONFIG_NEWLIB_LIBC_FLOAT_PRINTF=y

# Application thread stacks
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_ISR_STACK_SIZE=2048
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
